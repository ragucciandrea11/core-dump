name: 🐍 Python Core Integrity Check

# Il bot si sveglia ogni volta che fai un "git push" sul ramo "main"
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # Il bot accende un server virtuale con l'ultima versione di Ubuntu Linux
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Estrazione Codice Sorgente
      uses: actions/checkout@v4

    - name: ⚙️ Inizializzazione Ambiente Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: 📦 Installazione Dipendenze (AuraFarming)
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        if [ -f 01_python_core/AuraFarming/requirements.txt ]; then pip install -r 01_python_core/AuraFarming/requirements.txt; fi

    - name: 🛡️ Scansione Sintassi (Crash Test)
      run: |
        # Questo comando analizza il codice cercando errori critici di sintassi senza eseguirlo
        flake8 01_python_core/ --count --select=E9,F63,F7,F82 --show-source --statistics